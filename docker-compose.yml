services:
  api:
    build: .
    container_name: product-catalog-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/product_catalog
      DATABASE_USERNAME: product_user
      DATABASE_PASSWORD: product_password
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    container_name: product-catalog-db
    environment:
      POSTGRES_DB: product_catalog
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - product_catalog_data:/var/lib/postgresql/data

volumes:
  product_catalog_data:
